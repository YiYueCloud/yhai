<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限提示 · 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            padding: 20px;
        }

        .card {
            max-width: 460px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
            opacity: 0.85;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
            color: #1e293b;
        }

        p {
            font-size: 16px;
            color: #475569;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 20px;
            border-top: 1px solid #e9edf2;
            padding-top: 18px;
        }

        .sub strong {
            color: #64748b;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        /* Toast 气泡样式 */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.92);
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;  /* 避免干扰点 */
            z-index: 999;
        }
        #toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔒</span>
        <h1>暂未获得访问权限</h1>
        <p>您当前看到的页面属于测试环境，<br>部分功能尚未对外开放。</p>
        <p>如需访问，请与您的上游管理员确认权限配置。</p>
        <div class="sub">
            <span>这是测试页面 · 仅限内部调试使用</span><br>
            <span>如有疑问请联系 <strong id="email">moss@aoeb101la.top</strong></span>
        </div>
    </div>

    <!-- Toast 元素 -->
    <div id="toast">已复制</div>

    <script>
        (function() {
            const emailEl = document.getElementById('email');
            const toast = document.getElementById('toast');
            let clickCount = 0;
            let resetTimer = null;
            const RESET_DELAY = 300; // 毫秒，超过此间隔则重置计数
            let toastTimer = null;    // 用于隐藏 toast

            emailEl.addEventListener('click', function(e) {
                // 清除之前的重置定时器
                if (resetTimer) {
                    clearTimeout(resetTimer);
                }

                clickCount++;

                if (clickCount >= 5) {
                    // 第5次点击：跳转
                    window.location.href = './docs';
                    return;
                }

                // 前4次：显示 toast “已复制”
                toast.classList.add('show');

                // 清除之前可能残留的隐藏定时器
                if (toastTimer) {
                    clearTimeout(toastTimer);
                }
                // 0.8 秒后自动隐藏
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 800);

                // 设置重置定时器：如果超过 RESET_DELAY 无新点击，计数归零
                resetTimer = setTimeout(() => {
                    clickCount = 0;
                    resetTimer = null;
                }, RESET_DELAY);
            });
        })();
    </script>
</body>
</html>
