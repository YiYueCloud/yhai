<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限提示 · 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            padding: 20px;
        }

        .card {
            max-width: 460px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
            opacity: 0.85;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
            color: #1e293b;
        }

        p {
            font-size: 16px;
            color: #475569;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 20px;
            border-top: 1px solid #e9edf2;
            padding-top: 18px;
        }

        .sub strong {
            color: #64748b;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">🔒</span>
        <h1>暂未获得访问权限</h1>
        <p>您当前看到的页面属于测试环境，<br>部分功能尚未对外开放。</p>
        <p>如需访问，请与您的上游管理员确认权限配置。</p>
        <div class="sub">
            <span>这是测试页面 · 仅限内部调试使用</span><br>
            <span>如有疑问请联系 <strong>moss@aoeb101la.top</strong></span>
        </div>
    </div>
</body>
</html>
